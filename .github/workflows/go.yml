name: Go

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        # Linux + Windows only. macOS is intentionally excluded (cost) and is
        # verified manually on dev machines. Do NOT add macOS.
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Cross-platform Go checks on every OS. Includes the bootstrap
      # scaffolding-on-a-copy integration test. Pinned to bash (available on the
      # Windows runner) so the command parses identically on every leg — under
      # the Windows default shell (pwsh) `go test ... ./...` mis-parses the
      # coverage argument into a phantom `.out` package.
      - name: Test
        shell: bash
        run: go test -covermode=count -coverprofile=coverage.out ./...

      # The Unix-oriented make pipeline runs on Linux only (windows-latest
      # cannot run the bash/cp-based Makefile).
      - name: Build (make)
        if: matrix.os == 'ubuntu-latest'
        run: |
          make install
          make build

      # Coverage uploaded from a single leg to avoid double-submission.
      - name: Coverage
        if: matrix.os == 'ubuntu-latest'
        uses: jandelgado/gcov2lcov-action@v1.2.0

      - name: Coveralls
        if: matrix.os == 'ubuntu-latest'
        uses: coverallsapp/github-action@v2.3.7
        with:
          github-token: ${{ secrets.github_token }}
          path-to-lcov: coverage.lcov
